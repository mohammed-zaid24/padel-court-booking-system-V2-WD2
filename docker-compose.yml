services:
  db:
    image: mysql:8.0
    container_name: padel-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: padel_booking
      MYSQL_USER: padel_user
      MYSQL_PASSWORD: padel_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: padel-backend
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: padel_booking
      DB_USER: padel_user
      DB_PASS: padel_pass
      JWT_SECRET: "your-super-secret-jwt-key-change-in-production-2026"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
      # Anonymous volume keeps the image-installed vendor/ visible
      # (otherwise the host bind-mount above shadows it).
      - /var/www/html/vendor

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: padel-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: padel-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpass
    depends_on:
      - db

volumes:
  db_data:
